services:
  MV-Adapter:
    image: ghcr.io/toys-r-us-rex/mv-adapter:0.1.0
    container_name: MV-Adapter
    command: tail -f /dev/null  # Keep running
    restart: no
    environment:
      - HF_TOKEN=$HUGGINGFACE_TOKEN
    volumes:
      - ${PWD}/assets:/workspace/assets
      - ${PWD}/outputs:/workspace/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
